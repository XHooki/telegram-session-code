<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>境工厂</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <main class="card">
    <h1>境工厂</h1>
    <p class="muted">按照操作将自动帮您进行登录。</p>

    <section class="box">
      <h2>当前操作步骤</h2>
      <p id="current-step">请将手机号码复制或输入进下方框中（带区号），例如+1 783743728。</p>
    </section>

    <section id="step-phone" class="step active">
      <h2>输入手机号码</h2>
      <label>手机号码</label>
      <input id="phone" placeholder="例如 +1 783743728" autocomplete="tel" />
      <button onclick="requestCode()">获取 Telegram 验证码</button>
    </section>

    <section id="step-code" class="step">
      <h2>输入验证码</h2>
      <label>验证码</label>
      <input id="code" placeholder="例如 12345" autocomplete="one-time-code" />
      <label class="check">
        <input id="consent" type="checkbox" />
        我确认这是本人账号，并授权系统执行登录操作。
      </label>
      <button onclick="verifyCode()">确认并登录</button>
    </section>

    <section id="step-password" class="step">
      <h2>输入二步验证密码</h2>
      <p class="muted">该密码只用于本次登录验证。</p>
      <input id="password" type="password" placeholder="Telegram 2FA 密码" autocomplete="current-password" />
      <button onclick="verifyPassword()">提交 2FA 并登录</button>
    </section>

    <section id="result" class="result"></section>
  </main>

<script>
let authId = null;

function setCurrentStep(message) {
  document.getElementById('current-step').textContent = message;
}

function setResult(message, ok = true) {
  const el = document.getElementById('result');
  el.className = ok ? 'result ok' : 'result error';
  el.textContent = message;
}

function formatCodeMessage(message) {
  const match = String(message || '').match(/Login code:\s*([0-9]+)/i);
  return match ? `验证码为：${match[1]}` : message;
}

function showStep(id) {
  for (const el of document.querySelectorAll('.step')) el.classList.remove('active');
  document.getElementById(id).classList.add('active');
}

async function postForm(url, data) {
  const body = new URLSearchParams();
  for (const [k, v] of Object.entries(data)) body.append(k, v);
  const res = await fetch(url, { method: 'POST', body });
  const json = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(json.detail || '请求失败');
  return json;
}

async function requestCode() {
  try {
    setCurrentStep('正在获取中，请稍后....');
    setResult('正在获取中，请稍后....');
    const phone = document.getElementById('phone').value.trim();
    const json = await postForm('/api/auth/request-code', { phone });
    authId = json.auth_id;
    const codeMessage = formatCodeMessage(json.message);
    setResult(codeMessage);
    setCurrentStep(codeMessage.startsWith('验证码为：') ? codeMessage : '请将 Telegram 验证码复制或输入进下方框中。');
    showStep('step-code');
  } catch (e) {
    setCurrentStep('请将手机号码复制或输入进下方框中（带区号），例如+1 783743728。');
    setResult(e.message, false);
  }
}

async function verifyCode() {
  try {
    setCurrentStep('正在登录，请稍后....');
    const code = document.getElementById('code').value.trim();
    const consent = document.getElementById('consent').checked ? 'yes' : 'no';
    const json = await postForm('/api/auth/verify-code', { auth_id: authId, code, consent });
    if (json.needs_password) {
      setResult(json.message);
      setCurrentStep('请将 Telegram 2FA 密码复制或输入进下方框中。');
      showStep('step-password');
      return;
    }
    setCurrentStep('登录完成。');
    setResult('初始化完成');
  } catch (e) {
    setCurrentStep('请将 Telegram 验证码复制或输入进下方框中。');
    setResult(e.message, false);
  }
}

async function verifyPassword() {
  try {
    setCurrentStep('正在登录，请稍后....');
    const password = document.getElementById('password').value;
    const json = await postForm('/api/auth/verify-password', { auth_id: authId, password });
    setCurrentStep('登录完成。');
    setResult('初始化完成');
  } catch (e) {
    setCurrentStep('请将 Telegram 2FA 密码复制或输入进下方框中。');
    setResult(e.message, false);
  }
}
</script>
</body>
</html>
